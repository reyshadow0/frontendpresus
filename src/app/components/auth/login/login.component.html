<div class="dubai-wrapper">
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="glass-card">
    <div class="login-header">
      <div class="logo-container">
        <img src="/img/uteq-logo.png" alt="Logo UTEQ" class="uteq-logo">
      </div>
      <h1 class="brand-name">SISTEMA DE REGISTRO DE PRESUSTENTACIONES<span>.</span></h1>
      <p class="subtitle">Sistema de Gestión Académica</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group-custom">
        <label>Correo Institucional</label>
        <input type="email" formControlName="email" placeholder="user@uteq.edu.ec" autocomplete="off">
      </div>

      <div class="input-group-custom">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      <button type="submit" class="btn-dubai" [disabled]="loginForm.invalid || cargando">
        <span>{{ cargando ? 'Verificando...' : 'Acceder al Sistema' }}</span>
        <i class="bi bi-arrow-right-short" *ngIf="!cargando"></i>
        <i class="bi bi-hourglass-split" *ngIf="cargando"></i>
      </button>
    </form>

    <div class="login-footer">
      <p>© 2026 Facultad de Ciencias de la Ingeniería</p>
    </div>
  </div>
</div>
